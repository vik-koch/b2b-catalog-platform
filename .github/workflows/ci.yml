# CI:
#   PR           -> checks + smoke test (nothing pushed)
#   push to main -> checks + smoke test + build/push images (:main, :sha-<sha>)
# Release tags are handled by release.yml (promotes existing images, no rebuild).
#
# Images are built natively per architecture (amd64 + arm64 runners — no
# QEMU, the in-image Nx build would crawl under emulation) and stitched into
# one multi-arch manifest per image on GHCR, so the same tag works on the ARM
# demo VPS and any x86 deployment.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - run: cp .env.example .env

      - run: npx nx run-many -t lint test build format-check

      - run: npx nx e2e api-e2e

  # Boots the deploy stack from freshly built amd64 images (compose.yml +
  # compose.override.yml via the web-e2e global-setup) and runs Playwright
  # against it — the same smoke test as `nx e2e web-e2e` locally.
  smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - uses: docker/setup-buildx-action@v4

      # Pre-build the images under the tags .env.localtest expects — the
      # global-setup's `docker compose up` then uses them instead of building
      # uncached. Cache is read-only here: the scopes are exported by the
      # build-images amd64 jobs on main pushes, and PR-changed layers would
      # miss the cache on the next push anyway — exporting them (~1 min/run)
      # buys nothing.
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: b2b-catalog-platform-api:localtest
          cache-from: type=gha,scope=api-amd64

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: b2b-catalog-platform-web:localtest
          cache-from: type=gha,scope=web-amd64

      - run: npx playwright install --with-deps chromium

      - run: npx nx e2e web-e2e

      - name: Stack logs on failure
        if: failure()
        run: docker compose --env-file .env.localtest logs

  # Each matrix job pushes its arch variant by digest only (no tags yet);
  # merge-manifests below attaches the tags to a combined manifest list.
  build-images:
    if: github.event_name == 'push'
    needs: checks
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
        platform:
          - { docker: linux/amd64, arch: amd64, runner: ubuntu-24.04 }
          - { docker: linux/arm64, arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v7

      # GHCR requires a lowercase repository path.
      - run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.app }}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: ${{ matrix.platform.docker }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.app }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    if: github.event_name == 'push'
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.app }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.app }}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Full sha in the tag so the promote job can address it exactly.
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Verify manifest
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"

  # Merge to main auto-deploys the dev environment (NFR-OPS-01/-02) with the
  # sha-pinned images published above, via the same infra/deploy.sh used for
  # rehearsals and demo-up. Needs (see infra/README.md): repo variables
  # DEV_HOST, DEV_APP_DOMAIN, ACME_EMAIL + secrets DEMO_SSH_PRIVATE_KEY,
  # DEV_POSTGRES_PASSWORD, INBOX_PASSWORD.
  deploy-dev:
    if: github.event_name == 'push'
    needs: merge-manifests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: dev
      url: https://${{ vars.DEV_APP_DOMAIN }}
    steps:
      - uses: actions/checkout@v7

      - name: Write SSH key
        run: |
          printf '%s\n' "${{ secrets.DEMO_SSH_PRIVATE_KEY }}" > .deploy-key
          chmod 600 .deploy-key

      - name: Deploy
        env:
          SSH_OPTS: -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 -i ${{ github.workspace }}/.deploy-key
          DEV_HOST: ${{ vars.DEV_HOST }}
          APP_DOMAIN: ${{ vars.DEV_APP_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          # Guards the dev Mailpit reviewer inbox. Hashed below — the
          # plaintext is a masked secret and is never written to a log.
          INBOX_PASSWORD: ${{ secrets.INBOX_PASSWORD }}
          # Central logs. Both set -> the shared observability stack
          # is deployed; either unset -> deploy.sh leaves it untouched.
          GRAFANA_DOMAIN: ${{ vars.GRAFANA_DOMAIN }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          : "${DEV_HOST:?repo variable DEV_HOST is not set}"
          : "${APP_DOMAIN:?repo variable DEV_APP_DOMAIN is not set}"
          : "${ACME_EMAIL:?repo variable ACME_EMAIL is not set}"
          : "${POSTGRES_PASSWORD:?secret DEV_POSTGRES_PASSWORD is not set}"
          : "${INBOX_PASSWORD:?secret INBOX_PASSWORD is not set}"
          image_base="ghcr.io/${GITHUB_REPOSITORY,,}"

          # SHA1 htpasswd entry for Traefik basic-auth. SHA1 (not bcrypt) keeps
          # the string free of '$', which Compose would treat as interpolation.
          inbox_hash=$(printf '%s' "$INBOX_PASSWORD" | openssl sha1 -binary | openssl base64)

          # sha-pinned: this deploy ships exactly the manifests merged above.
          # POSTGRES_PASSWORD must stay stable across deploys — the volume is
          # initialized once and keeps the first password it ever saw.
          cat > "$RUNNER_TEMP/dev.env" <<EOF
          STACK_NAME=dev
          APP_DOMAIN=$APP_DOMAIN
          API_IMAGE=$image_base-api:sha-$GITHUB_SHA
          WEB_IMAGE=$image_base-web:sha-$GITHUB_SHA
          POSTGRES_DB=b2b_catalog
          POSTGRES_USER=b2b_catalog
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          MAIL_HOST=mailpit
          MAIL_PORT=1025
          MAIL_FROM=Coffee Kontor <no-reply@coffee-kontor.example>
          MAIL_CONTACT_TO=hallo@coffee-kontor.example
          INBOX_BASICAUTH=reviewer:{SHA}$inbox_hash
          EOF
          printf 'ACME_EMAIL=%s\n' "$ACME_EMAIL" > "$RUNNER_TEMP/traefik.env"

          # Opt-in observability: only when both the hostname and password are
          # configured. Absent -> OBSERVABILITY_ENV stays unset and the stack is
          # left untouched (see deploy.sh).
          if [ -n "$GRAFANA_DOMAIN" ] && [ -n "$GRAFANA_ADMIN_PASSWORD" ]; then
            cat > "$RUNNER_TEMP/observability.env" <<EOF
          GRAFANA_DOMAIN=$GRAFANA_DOMAIN
          GRAFANA_ADMIN_PASSWORD=$GRAFANA_ADMIN_PASSWORD
          EOF
            export OBSERVABILITY_ENV="$RUNNER_TEMP/observability.env"
          fi

          infra/deploy.sh "$DEV_HOST" "$RUNNER_TEMP/dev.env" \
            "$RUNNER_TEMP/traefik.env" compose.mailpit.yml
