# CI:
#   PR           -> checks + smoke test (nothing pushed)
#   push to main -> checks + smoke test + build/push images (:main, :sha-<sha>)
# Release tags are handled by release.yml (promotes existing images, no rebuild).
#
# Images are built natively per architecture (amd64 + arm64 runners — no
# QEMU, the in-image Nx build would crawl under emulation) and stitched into
# one multi-arch manifest per image on GHCR, so the same tag works on the ARM
# demo VPS and any x86 deployment.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - run: cp .env.example .env

      - run: npx nx run-many -t lint test build format-check

      - run: npx nx e2e api-e2e

  # Boots the deploy stack from freshly built amd64 images (compose.yml +
  # compose.override.yml via the web-e2e global-setup) and runs Playwright
  # against it — the same smoke test as `nx e2e web-e2e` locally.
  smoke-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - uses: docker/setup-buildx-action@v3

      # Pre-build the images under the tags .env.localtest expects — the
      # global-setup's `docker compose up` then uses them instead of building
      # uncached. Cache scopes are shared with the build-images amd64 jobs.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: b2b-catalog-platform-api:localtest
          cache-from: type=gha,scope=api-amd64
          cache-to: type=gha,mode=max,scope=api-amd64

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: b2b-catalog-platform-web:localtest
          cache-from: type=gha,scope=web-amd64
          cache-to: type=gha,mode=max,scope=web-amd64

      - run: npx playwright install --with-deps chromium

      - run: npx nx e2e web-e2e

      - name: Stack logs on failure
        if: failure()
        run: docker compose --env-file .env.localtest logs

  # Each matrix job pushes its arch variant by digest only (no tags yet);
  # merge-manifests below attaches the tags to a combined manifest list.
  build-images:
    if: github.event_name == 'push'
    needs: checks
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
        platform:
          - { docker: linux/amd64, arch: amd64, runner: ubuntu-24.04 }
          - { docker: linux/arm64, arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      # GHCR requires a lowercase repository path.
      - run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.app }}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          platforms: ${{ matrix.platform.docker }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.app }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest='${{ steps.build.outputs.digest }}'
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.app }}-${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifests:
    if: github.event_name == 'push'
    needs: build-images
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [api, web]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.app }}-*
          path: ${{ runner.temp }}/digests
          merge-multiple: true

      - run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.app }}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Full sha in the tag so the promote job can address it exactly.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=long

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Verify manifest
        run: docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}"
